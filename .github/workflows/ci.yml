name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install build deps (SQLite CGO)
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Go mod download
        run: go mod download

      - name: Build API
        run: CGO_ENABLED=1 go build -o main ./cmd/server

      - name: Smoke test binary
        run: |
          DB_DRIVER=sqlite DB_PATH=/tmp/test.db timeout 5 ./main &
          sleep 2
          curl -sf http://localhost:8080/api/v1/platforms
          kill %1 2>/dev/null || true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aikuaixia-api ./backend
