# Render 一键部署：https://render.com/docs/blueprint-spec
services:
  - type: web
    name: aikuaixia-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /api/v1/platforms
    envVars:
      - key: DB_DRIVER
        value: sqlite
      - key: DB_PATH
        value: /app/data/aikuaixia.db
      - key: GIN_MODE
        value: release
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "8080"
