<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI快侠 - 在线使用</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #6C63FF;
      --primary-dark: #5A52E0;
      --accent: #FF6B6B;
      --bg-dark: #0F0E17;
      --bg-card: #1A1932;
      --bg-input: #16152B;
      --text: #FFFFFE;
      --text-secondary: #A7A9BE;
      --success: #2ED573;
      --error: #FF4757;
      --gradient: linear-gradient(135deg, #6C63FF 0%, #FF6B6B 100%);
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== Header ===== */
    header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(15, 14, 23, 0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--gradient);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
    }

    .back-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--primary); }

    /* ===== Main Container ===== */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .hero-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .hero-section h1 {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .hero-section h1 .gradient {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-section p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    /* ===== Input Section ===== */
    .input-section {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 32px;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 24px;
    }

    .input-label {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 16px;
      background: var(--bg-input);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    textarea::placeholder {
      color: var(--text-secondary);
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-paste {
      background: rgba(108, 99, 255, 0.15);
      color: var(--primary);
      border: 1px solid rgba(108, 99, 255, 0.3);
    }

    .btn-paste:hover {
      background: rgba(108, 99, 255, 0.25);
    }

    .btn-parse {
      background: var(--gradient);
      color: white;
      flex: 1;
      box-shadow: 0 4px 16px rgba(108, 99, 255, 0.3);
    }

    .btn-parse:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
    }

    .btn-parse:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== Result Section ===== */
    .result-section {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 32px;
      border: 1px solid rgba(255,255,255,0.05);
      display: none;
    }

    .result-section.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .result-icon {
      width: 48px;
      height: 48px;
      background: rgba(46, 213, 115, 0.15);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .result-title {
      font-size: 18px;
      font-weight: 700;
    }

    .result-platform {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .video-info {
      background: var(--bg-input);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .info-row:last-child { margin-bottom: 0; }

    .info-label {
      color: var(--text-secondary);
      font-size: 14px;
      min-width: 50px;
    }

    .info-value {
      font-size: 14px;
      flex: 1;
    }

    .btn-download {
      width: 100%;
      padding: 14px;
      background: var(--gradient);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(108, 99, 255, 0.3);
    }

    .btn-download:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
    }

    /* ===== Loading ===== */
    .loading {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .loading.show { display: block; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(108, 99, 255, 0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== Error ===== */
    .error-msg {
      display: none;
      background: rgba(255, 71, 87, 0.1);
      border: 1px solid rgba(255, 71, 87, 0.3);
      border-radius: 12px;
      padding: 16px;
      color: var(--error);
      margin-top: 16px;
      font-size: 14px;
    }

    .error-msg.show { display: block; }

    /* ===== Supported Platforms ===== */
    .platforms-section {
      margin-top: 40px;
      text-align: center;
    }

    .platforms-title {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .platform-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .platform-tag {
      padding: 6px 14px;
      background: var(--bg-card);
      border-radius: 50px;
      font-size: 13px;
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 14px;
      z-index: 1000;
      transition: transform 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ===== Mobile ===== */
    @media (max-width: 600px) {
      .container { padding: 24px 16px; }
      .hero-section h1 { font-size: 1.5rem; }
      .btn-group { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a href="index.html" class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">AI快侠</span>
    </a>
    <a href="index.html" class="back-link">← 返回首页</a>
  </header>

  <!-- Main -->
  <div class="container">
    <!-- Hero -->
    <div class="hero-section">
      <h1><span class="gradient">AI快侠</span> 在线使用</h1>
      <p>粘贴视频分享文字，AI自动识别链接，一键下载</p>
    </div>

    <!-- Input Section -->
    <div class="input-section">
      <div class="input-label">
        📋 粘贴视频分享文字
      </div>
      <div class="input-wrapper">
        <textarea id="urlInput" placeholder="例如：卷疯了！61 键满配 + RGB 光效... https://v.douyin.com/xxx 复制此链接，打开【抖音】，直接观看视频！

直接粘贴整段文字即可，AI会自动识别链接"></textarea>
      </div>
      <div class="btn-group">
        <button class="btn btn-paste" onclick="pasteFromClipboard()">
          📋 粘贴
        </button>
        <button class="btn btn-parse" id="parseBtn" onclick="parseVideo()">
          🔍 解析下载
        </button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在解析视频...</p>
    </div>

    <!-- Result Section -->
    <div class="result-section" id="resultSection">
      <div class="result-header">
        <div class="result-icon">✅</div>
        <div>
          <div class="result-title">解析成功</div>
          <div class="result-platform" id="resultPlatform">-</div>
        </div>
      </div>
      <div class="video-info">
        <div class="info-row">
          <span class="info-label">📝 标题</span>
          <span class="info-value" id="resultTitle">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">👤 作者</span>
          <span class="info-value" id="resultAuthor">-</span>
        </div>
      </div>
      <button class="btn-download" onclick="downloadVideo()">
        ⬇️ 下载视频
      </button>
    </div>

    <!-- Supported Platforms -->
    <div class="platforms-section">
      <div class="platforms-title">支持的平台</div>
      <div class="platform-tags">
        <span class="platform-tag">🎵 抖音</span>
        <span class="platform-tag">🎬 快手</span>
        <span class="platform-tag">📺 B站</span>
        <span class="platform-tag">📕 小红书</span>
        <span class="platform-tag">▶️ YouTube</span>
        <span class="platform-tag">🎶 TikTok</span>
        <span class="platform-tag">📹 微视</span>
        <span class="platform-tag">🍉 西瓜视频</span>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // API配置
    const API_BASE = 'http://localhost:8080/api/v1';
    
    let currentData = null;

    // 从剪贴板粘贴
    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        document.getElementById('urlInput').value = text;
        showToast('已粘贴');
      } catch (e) {
        showToast('无法读取剪贴板，请手动粘贴');
      }
    }

    // 解析视频
    async function parseVideo() {
      const input = document.getElementById('urlInput').value.trim();
      if (!input) {
        showError('请输入视频链接或分享文字');
        return;
      }

      // 隐藏之前的结果和错误
      hideError();
      document.getElementById('resultSection').classList.remove('show');
      
      // 显示加载
      document.getElementById('loading').classList.add('show');
      document.getElementById('parseBtn').disabled = true;

      try {
        const response = await fetch(`${API_BASE}/parse`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: input })
        });

        const result = await response.json();

        if (result.code === 200) {
          currentData = result.data;
          
          // 显示结果
          document.getElementById('resultPlatform').textContent = `平台: ${result.data.platform}`;
          document.getElementById('resultTitle').textContent = result.data.title || '未知';
          document.getElementById('resultAuthor').textContent = result.data.author || '未知';
          document.getElementById('resultSection').classList.add('show');
          
          showToast('解析成功！');
        } else {
          showError(result.error || '解析失败，请检查链接是否正确');
        }
      } catch (e) {
        showError('网络错误，请检查网络连接');
      } finally {
        document.getElementById('loading').classList.remove('show');
        document.getElementById('parseBtn').disabled = false;
      }
    }

    // 下载视频
    function downloadVideo() {
      if (!currentData) return;
      
      const input = document.getElementById('urlInput').value.trim();
      // 提取原始链接
      const urlMatch = input.match(/https?:\/\/v\.douyin\.com\/\w+\/?/i) ||
                       input.match(/https?:\/\/[^\s]+/i);
      const shareUrl = urlMatch ? urlMatch[0] : input;
      
      const downloadUrl = `${API_BASE}/download/v2?url=${encodeURIComponent(shareUrl)}&platform=${currentData.platform}&title=${encodeURIComponent(currentData.title || 'video')}`;
      
      showToast('正在下载，请稍候...');
      
      // 创建隐藏的a标签触发下载
      const a = document.createElement('a');
      a.href = downloadUrl;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // 显示错误
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }

    // 隐藏错误
    function hideError() {
      document.getElementById('errorMsg').classList.remove('show');
    }

    // 显示Toast
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // 快捷键支持
    document.getElementById('urlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        parseVideo();
      }
    });
  </script>

</body>
</html>
